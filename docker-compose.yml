services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # Copy from backend/.env.example — never commit
    environment:
      PYTHONUNBUFFERED: "1"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL is baked into the JS bundle at build time.
        # This value is what the *browser* uses, so it must be reachable from the user's machine.
        # For local dev on the same host, localhost:8000 is correct.
        # For production, replace with your backend's public URL.
        VITE_API_URL: "http://localhost:8000"
    ports:
      - "8080:8080"
    restart: unless-stopped
